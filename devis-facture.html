<!DOCTYPE html>
<html lang="fr">

<head>
  <script src="js/devis-facture-access.js"></script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Devis & Facture</title>
  <link rel="stylesheet" href="css/devis-facture.css">
</head>

<body>
  <div class="app">
    <div class="topbar">
      <div class="title-wrap">
        <h1>Devis & Facture</h1>
      </div>
      <div class="actions">
        <button onclick="printCurrentPage()">Imprimer l’onglet</button>
      </div>
    </div>

    <div class="tabs" id="tabs"></div>
    <div id="pages"></div>
    <input id="localJsonImportInput" type="file" accept="application/json" style="display:none"
      onchange="handleLocalJsonImport(event)">
    <input id="localJsonToDriveInput" type="file" accept="application/json" multiple style="display:none"
      onchange="uploadLocalJsonToDrive(event)">
  </div>

  <script src="https://apis.google.com/js/api.js"></script>

  <script src="js/devis-facture.js"></script>
</body>

</html>
