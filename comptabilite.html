<!DOCTYPE html>
<html lang="fr">

<head>
  <script src="js/comptabilite-access.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Comptabilité</title>
  <link rel="stylesheet" href="css/comptabilite.css">
  <script src="https://apis.google.com/js/api.js"></script>

</head>

<body>
  <div class="app">
    <div class="topbar">
      <div class="title-wrap">
        <h1>Comptabilité</h1>

        <div class="top-actions">
          <button onclick="goToPage('gdrive')">Google Drive</button>
          <button onclick="goToPage('settings')">Paramètres</button>
          <button onclick="openIntervat()">Intervat</button>
        </div>
      </div>
      <div class="actions">
        <div class="dropdown">
          <button type="button" class="dropdown-toggle" onclick="toggleFileMenu(event)">Fichier ▼</button>
          <div class="dropdown-menu" id="fileMenu">
            <button type="button" onclick="importDataLocal(); closeFileMenu()">Importer depuis ce PC</button>
            <button type="button" onclick="exportDataLocal(); closeFileMenu()">Exporter vers ce PC</button>
            <div class="dropdown-sep"></div>
            <button type="button" onclick="importDataFromDriveMenu(); closeFileMenu()">Importer depuis Google
              Drive</button>
            <button type="button" onclick="exportJsonToDrive(); closeFileMenu()">Exporter vers Google Drive</button>
            <button type="button" onclick="openDriveDownloadManager(); closeFileMenu()">Sauvegarder un fichier Drive
              vers ce PC</button>
            <button type="button" onclick="pickLocalJsonForDrive(); closeFileMenu()">Envoyer des fichiers du PC vers
              Drive</button>
          </div>
        </div>
        <button onclick="openPrintReport()">Export PDF / Imprimer</button>
      </div>
    </div>

    <div class="summary-grid">
      <div class="card">
        <div class="metric-label">Ventes HTVA</div>
        <div class="metric-value" id="metricSales">0,00 €</div>
      </div>
      <div class="card">
        <div class="metric-label">Achats HTVA</div>
        <div class="metric-value" id="metricPurchases">0,00 €</div>
      </div>
      <div class="card">
        <div class="metric-label">TVA nette</div>
        <div class="metric-value" id="metricVat">0,00 €</div>
      </div>
      <div class="card">
        <div class="metric-label">Résultat estimé</div>
        <div class="metric-value" id="metricProfit">0,00 €</div>
      </div>
    </div>

    <div class="tabs" id="tabs"></div>
    <div id="pages"></div>
    <input id="localJsonImportInput" type="file" accept="application/json" style="display:none"
      onchange="handleLocalJsonImport(event)">
    <input id="localJsonToDriveInput" type="file" accept="application/json" multiple style="display:none"
      onchange="uploadLocalJsonToDrive(event)">
    <input id="purchasePdfUploadInput" type="file" accept="application/pdf" style="display:none"
      onchange="handlePurchasePdfUpload(event)">
  </div>

  <script src="js/comptabilite.js"></script>
</body>

</html>
